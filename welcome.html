<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - SmartAgri</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/animations.css">
    <style>
        .welcome-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-body), var(--bg-card));
            padding: 20px;
        }
        .welcome-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slide-in-up 0.5s ease;
        }
        .welcome-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .welcome-title {
            color: var(--text-primary);
            font-size: 2.5rem;
            margin-bottom: 15px;
            font-weight: 800;
        }
        .welcome-desc {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .welcome-features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
            text-align: left;
        }
        .feature-item {
            background: rgba(46,171,46,0.1);
            padding: 12px;
            border-radius: var(--radius-md);
            color: var(--green-300);
            font-size: 0.9rem;
            font-weight: 500;
        }
        @media (max-width: 480px) {
            .welcome-features {
                grid-template-columns: 1fr;
            }
        }
        .btn-large {
            display: inline-block;
            width: 100%;
            padding: 16px;
            font-size: 1.2rem;
            text-align: center;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="welcome-page">
        <div class="welcome-card">
            <div class="welcome-icon">🌾</div>
            <h1 class="welcome-title">SmartAgri</h1>
            <p class="welcome-desc">Your intelligent agriculture assistant. Empowering farmers with AI-driven crop recommendations, disease detection, weather updates, and market insights.</p>
            
            <div class="welcome-features">
                <div class="feature-item">🌱 Crop Recommendations</div>
                <div class="feature-item">🔬 Plant Disease Detection</div>
                <div class="feature-item">🌤️ Weather & Irrigation</div>
                <div class="feature-item">🤖 Farmer AI Chatbot</div>
            </div>

            <a href="{{ url_for('login') }}" class="btn-primary btn-large">Get Started</a>
        </div>
    </div>
</body>
</html>
